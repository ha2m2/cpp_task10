name: LFS Pointer Integrity Check

on:
  pull_request:
    branches: ["main", "develop"]

jobs:
  check-pointers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (Without LFS)
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Verify Modified Unreal Assets are LFS Pointers
        run: |
          ERROR_COUNT=0
          # PR에서 변경된 .uasset, .umap 파일만 추출
          MODIFIED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(uasset|umap)$' || true)

          if [ -z "$MODIFIED_FILES" ]; then
            echo "검사할 언리얼 에셋이 없습니다."
            exit 0
          fi

          for file in $MODIFIED_FILES; do
            if [ -f "$file" ] && ! head -n 1 "$file" | grep -q "version https://git-lfs.github.com/spec/v1"; then
              echo "ERROR: 생 바이너리 업로드 감지! -> $file"
              ERROR_COUNT=$((ERROR_COUNT+1))
            fi
          done

          if [ $ERROR_COUNT -gt 0 ]; then
            echo "총 $ERROR_COUNT 개의 에셋이 LFS를 거치지 않았습니다."
            echo "작업자 로컬 터미널에서 'git add --renormalize .' 후 다시 커밋해주세요."
            exit 1
          fi
          echo "모든 변경된 에셋이 정상적인 LFS 포인터입니다."
